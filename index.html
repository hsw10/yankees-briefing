<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Yankees Briefing</title>
<style>
  :root{--navy:#071a33;--blue:#163f73;--paper:#f5f1e8;--ink:#17212b;--muted:#617080;--line:#d8d4ca;--gold:#d1a427}
  *{box-sizing:border-box} body{margin:0;background:var(--paper);color:var(--ink);font-family:Georgia, 'Times New Roman', serif}
  .masthead{background:var(--navy);color:#fff;padding:30px max(24px,calc((100vw - 1460px)/2));border-bottom:5px solid var(--gold);display:flex;align-items:end;justify-content:space-between;gap:30px}
  h1{margin:0;font-size:clamp(2.1rem,5vw,4.4rem);letter-spacing:-.065em;line-height:.85;display:flex;align-items:center;gap:.16em}.ny-logo{height:.98em;width:auto;display:block;filter:drop-shadow(0 1px 0 rgba(255,255,255,.22))}.eyebrow{font:700 11px/1.2 Arial,sans-serif;letter-spacing:.18em;color:#e8cf7d;margin:0 0 11px;text-transform:uppercase}.sub{margin:13px 0 0;font:15px/1.4 Arial,sans-serif;color:#c7d1df}
  button{appearance:none;background:#fff;color:var(--navy);border:0;border-radius:3px;padding:13px 16px;cursor:pointer;font:700 12px Arial,sans-serif;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap}.refreshing{opacity:.6;pointer-events:none}
  main{max-width:1460px;margin:auto;padding:30px 24px 60px}.status{font:12px Arial,sans-serif;color:var(--muted);padding-bottom:22px;border-bottom:1px solid var(--line)}
  .site{padding:31px 0;border-bottom:1px solid var(--line)}.site-head{display:flex;align-items:center;justify-content:space-between;gap:15px;margin-bottom:17px}.brand{display:flex;align-items:center;gap:12px;text-decoration:none;color:inherit}.logo{width:34px;height:34px;object-fit:contain;border-radius:50%;background:#fff;border:1px solid var(--line);padding:3px}.site h2{margin:0;font-size:25px;letter-spacing:-.04em}.source{font:700 11px Arial,sans-serif;letter-spacing:.12em;text-transform:uppercase;color:var(--blue)}
  .posts{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:14px}.post{display:block;text-decoration:none;color:inherit;background:#fff;border:1px solid var(--line);min-width:0;transition:transform .16s,box-shadow .16s}.post:hover{transform:translateY(-4px);box-shadow:0 9px 22px #18202b18}.image{width:100%;aspect-ratio:16/9;background:linear-gradient(130deg,#dfe6e6,#b8c3c8);overflow:hidden}.image img{width:100%;height:100%;object-fit:cover;display:block}.copy{padding:13px}.date{font:700 10px Arial,sans-serif;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;min-height:12px}.title{font-size:17px;line-height:1.06;letter-spacing:-.025em;margin:9px 0 7px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}.excerpt{font:12px/1.35 Arial,sans-serif;color:#5b6875;margin:0;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.error{font:14px Arial,sans-serif;color:#9d2d29;background:#fff0ed;padding:12px}
  @media(max-width:1050px){.posts{grid-template-columns:repeat(3,1fr)}}@media(max-width:650px){.masthead{align-items:start;flex-direction:column;padding-top:24px}.posts{grid-template-columns:repeat(2,1fr);gap:10px}.site{padding:24px 0}.site h2{font-size:22px}.title{font-size:15px}.excerpt{display:none}main{padding:20px 14px 45px}}
  @media(prefers-reduced-motion:reduce){.post{transition:none}}
</style>
</head>
<body>
<header class="masthead"><div><p class="eyebrow">The daily wire · New York Yankees</p><h1><img class="ny-logo" src="yankees-logo.png" alt="New York Yankees">Briefing</h1><p class="sub">Five newest stories from five of the most-read Yankees destinations.</p></div><button id="refresh" type="button" title="Refreshes are published daily at 9 AM ET; use the GitHub Actions workflow for a manual publish.">↻ Update now</button></header>
<main><div class="status" id="status">Loading the latest dispatches…</div><div id="digest"></div></main>
<script>
const digest=document.querySelector('#digest'), status=document.querySelector('#status'), button=document.querySelector('#refresh');
const esc=s=>String(s||'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
const date=s=>{try{return new Intl.DateTimeFormat(undefined,{month:'short',day:'numeric',year:'numeric'}).format(new Date(s))}catch{return s||''}};
function emptyImage(title){return `data:image/svg+xml,${encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450"><rect width="100%" height="100%" fill="#dbe2e4"/><text x="50%" y="50%" text-anchor="middle" dominant-baseline="middle" fill="#14345d" font-family="Georgia" font-size="28">${title.replace(/[<&>]/g,'')}</text></svg>`)}`}
async function load(){try{const res=await fetch(`data.json?t=${Date.now()}`,{cache:'no-store'});if(!res.ok)throw Error('No digest data yet');const data=await res.json();status.textContent=`Last updated ${new Date(data.refreshedAt).toLocaleString()} · Daily automatic refresh: 9:00 AM`;
 digest.innerHTML=data.sites.map(site=>`<section class="site"><div class="site-head"><a class="brand" href="${esc(site.url)}" target="_blank" rel="noopener"><img class="logo" src="${esc(site.logo)}" onerror="this.style.visibility='hidden'" alt="${esc(site.name)} logo"><h2>${esc(site.name)}</h2></a><span class="source">Latest five</span></div>${site.status==='error'?`<div class="error">This source could not be updated: ${esc(site.error)}</div>`:`<div class="posts">${site.posts.map(p=>`<a class="post" href="${esc(p.url)}" target="_blank" rel="noopener"><div class="image"><img src="${esc(p.image||emptyImage(site.name))}" alt="" loading="lazy" onerror="this.src='${emptyImage(site.name)}'"></div><div class="copy"><div class="date">${esc(date(p.published))}</div><h3 class="title">${esc(p.title)}</h3><p class="excerpt">${esc(p.excerpt)}</p></div></a>`).join('')}</div>`}</section>`).join('');
}catch(e){status.textContent='Unable to load the local digest.';digest.innerHTML=`<p class="error">${esc(e.message)} Run the update again.</p>`}}
button.onclick=()=>{window.open('https://github.com/hsw10/yankees-briefing/actions/workflows/refresh.yml','_blank','noopener')};load();
</script></body></html>
